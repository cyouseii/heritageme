<!DOCTYPE html>

<html lang="zh"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>非遗盲盒 · 今日之物</title>
<style>
  :root {
    --ink: #0f0e0c;
    --vermillion: #c0392b;
    --gold: #c9a84c;
    --gold-light: #e8d5a3;
    --smoke: #f0ebe3;
    --ash: #9a9088;
    --paper: #faf6f0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--ink);
    color: var(--smoke);
    font-family: "Noto Serif SC", "Noto Sans SC", serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-x: hidden;
  }

  /* ── Header ── */
  header { width: 100%; padding: 2rem 2rem 0; text-align: center; }
  .logo {
    font-family: "Noto Serif SC", serif;
    font-size: clamp(1.1rem, 2vw, 1.4rem);
    font-weight: 400;
    letter-spacing: 0.4em;
    color: var(--gold);
  }
  .tagline { font-size: 0.75rem; letter-spacing: 0.2em; color: var(--ash); margin-top: 0.3rem; }

  /* ── Lang badge ── */
  .lang-badge {
    position: fixed; top: 1rem; right: 1rem; z-index: 100;
    display: flex; gap: 0.3rem;
  }
  .lang-badge button {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 4px; color: var(--ash);
    font-size: 0.7rem; padding: 0.25rem 0.5rem;
    cursor: pointer; letter-spacing: 0.05em; transition: all 0.2s;
  }
  .lang-badge button:hover, .lang-badge button.active {
    color: var(--gold); border-color: var(--gold); background: rgba(201,168,76,0.1);
  }

  /* ── Main layout ── */
  main {
    width: 100%; max-width: 680px;
    padding: 2.5rem 1.5rem 4rem;
    display: flex; flex-direction: column; align-items: center; gap: 2.5rem;
  }

  .step-label { font-size: 0.7rem; letter-spacing: 0.3em; color: var(--ash); text-align: center; }

  .screen { width: 100%; display: none; flex-direction: column; align-items: center; gap: 2rem; }
  .screen.active { display: flex; }

  .prompt {
    font-family: "Noto Serif SC", serif;
    font-size: clamp(1.3rem, 3.5vw, 1.8rem);
    font-weight: 700; text-align: center; line-height: 1.6; color: var(--smoke);
  }
  .prompt em { color: var(--gold); font-style: normal; }

  /* ── Language select ── */
  .lang-grid { display: flex; gap: 1rem; width: 100%; max-width: 420px; }
  .lang-btn {
    flex: 1; background: rgba(255,255,255,0.03);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 14px; padding: 2rem 1rem; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 0.7rem;
    transition: all 0.25s ease; color: var(--smoke);
  }
  .lang-btn:hover, .lang-btn.selected {
    border-color: var(--gold); background: rgba(201,168,76,0.08);
    transform: translateY(-2px); box-shadow: 0 8px 30px rgba(201,168,76,0.1);
  }
  .lang-flag { font-size: 2.2rem; }
  .lang-name { font-family: "Noto Serif SC", serif; font-size: 1rem; font-weight: 700; letter-spacing: 0.05em; }
  .lang-sub { font-size: 0.7rem; color: var(--ash); letter-spacing: 0.05em; }

  /* ── Emotion grid ── */
  .emotion-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0.8rem; width: 100%; }
  .emotion-btn {
    background: transparent; border: 1px solid rgba(201,168,76,0.25);
    border-radius: 12px; padding: 1.1rem 0.5rem; cursor: pointer;
    display: flex; flex-direction: column; align-items: center; gap: 0.5rem;
    transition: all 0.2s ease; color: var(--smoke); position: relative; z-index: 1;
  }
  .emotion-btn:hover, .emotion-btn.selected {
    border-color: var(--gold); background: rgba(201,168,76,0.08);
  }
  .emotion-btn.selected { background: rgba(201,168,76,0.15); box-shadow: 0 0 20px rgba(201,168,76,0.1); }
  .emotion-icon { font-size: 1.8rem; pointer-events: none; }
  .emotion-name { font-size: 0.85rem; letter-spacing: 0.05em; font-family: "Noto Serif SC", serif; pointer-events: none; }
  .emotion-sub { font-size: 0.65rem; color: var(--ash); letter-spacing: 0.02em; pointer-events: none; }

  /* ── Vibe pick ── */
  .vibe-grid { display: flex; gap: 0.7rem; flex-wrap: wrap; justify-content: center; }
  .vibe-btn {
    background: transparent; border: 1px solid rgba(255,255,255,0.15);
    border-radius: 30px; padding: 0.55rem 1.1rem; cursor: pointer;
    font-size: 0.82rem; color: var(--smoke); letter-spacing: 0.05em;
    transition: all 0.2s; display: flex; align-items: center; gap: 0.4rem;
    position: relative; z-index: 1;
  }
  .vibe-btn > * { pointer-events: none; }
  .vibe-btn:hover, .vibe-btn.selected {
    border-color: var(--vermillion); background: rgba(192,57,43,0.12);
  }
  .vibe-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  /* ── CTA ── */
  .cta {
    background: var(--vermillion); color: white; border: none;
    border-radius: 8px; padding: 0.9rem 2.5rem; font-size: 1rem;
    font-family: "Noto Serif SC", serif; font-weight: 700; letter-spacing: 0.15em;
    cursor: pointer; transition: all 0.2s; z-index: 1;
  }
  .cta:hover { background: #a93226; transform: translateY(-1px); }
  .cta:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  /* Back button */
  .back-btn {
    background: none; border: none; color: var(--ash);
    font-size: 0.75rem; cursor: pointer; letter-spacing: 0.1em;
    padding: 0.4rem 0; transition: color 0.2s;
    font-family: inherit;
  }
  .back-btn:hover { color: var(--gold); }

  /* ── Box screen ── */
  #screen-open { justify-content: center; min-height: 300px; }

  .box-wrapper { display: flex; flex-direction: column; align-items: center; gap: 1.8rem; }

  .box-container {
    position: relative; width: 180px; height: 180px; cursor: pointer; z-index: 1;
  }

  .box {
    width: 100%; height: 100%;
    background: linear-gradient(135deg, #1a1614 0%, #2d2420 100%);
    border: 1px solid var(--gold);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    position: relative;
    transition: transform 0.15s ease, opacity 0.4s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 40px rgba(201,168,76,0.15), inset 0 0 30px rgba(201,168,76,0.03);
  }
  .box:hover { transform: scale(1.03); }

  .box-glyph {
    font-family: "Noto Serif SC", serif; font-size: 2.5rem;
    color: rgba(201,168,76,0.2); user-select: none; transition: all 0.3s;
  }

  .box-hint {
    position: absolute; bottom: -2.2rem; width: 100%;
    text-align: center; font-size: 0.72rem; color: var(--ash);
    letter-spacing: 0.15em; transition: opacity 0.3s;
  }

  /* pulse ring */
  @keyframes pulse-ring {
    0% { transform: scale(1); opacity: 0.6; }
    100% { transform: scale(1.35); opacity: 0; }
  }
  .box::before {
    content: ''; position: absolute; inset: -6px;
    border: 1px solid var(--gold); border-radius: 20px;
    animation: pulse-ring 2s ease-out infinite;
  }

  /* ── Progress indicator ── */
  .tap-progress {
    display: flex; gap: 10px; align-items: center;
  }
  .tap-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: rgba(201,168,76,0.2);
    border: 1px solid rgba(201,168,76,0.3);
    transition: all 0.3s ease;
  }
  .tap-dot.filled {
    background: var(--gold);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(201,168,76,0.4);
  }
  .tap-dot.current {
    border-color: var(--gold);
    animation: dot-pulse 1s ease-in-out infinite;
  }
  @keyframes dot-pulse {
    0%, 100% { box-shadow: 0 0 4px rgba(201,168,76,0.2); }
    50% { box-shadow: 0 0 14px rgba(201,168,76,0.6); }
  }

  /* ── Hint reveal ── */
  .hint-text {
    text-align: center; font-size: 0.9rem; color: var(--gold-light);
    letter-spacing: 0.08em; min-height: 1.5em;
    padding: 0.8rem 1.2rem;
    background: rgba(201,168,76,0.06);
    border: 1px solid rgba(201,168,76,0.15);
    border-radius: 10px;
    opacity: 0; transform: translateY(8px);
    transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
    max-width: 320px; width: 100%;
  }
  .hint-text.show {
    opacity: 1; transform: translateY(0);
  }

  /* ── Box shake variations ── */
  @keyframes shake-light {
    0%,100%{transform:translateX(0)}
    25%{transform:translateX(-3px)}
    75%{transform:translateX(3px)}
  }
  @keyframes shake-medium {
    0%,100%{transform:translateX(0) rotate(0)}
    15%{transform:translateX(-5px) rotate(-1.5deg)}
    30%{transform:translateX(5px) rotate(1.5deg)}
    45%{transform:translateX(-4px) rotate(-1deg)}
    60%{transform:translateX(4px) rotate(1deg)}
    75%{transform:translateX(-2px)}
  }
  @keyframes shake-heavy {
    0%,100%{transform:translateX(0) rotate(0) scale(1)}
    10%{transform:translateX(-7px) rotate(-2deg) scale(0.98)}
    20%{transform:translateX(7px) rotate(2deg) scale(1.02)}
    30%{transform:translateX(-6px) rotate(-1.5deg)}
    40%{transform:translateX(6px) rotate(1.5deg)}
    50%{transform:translateX(-4px) rotate(-1deg)}
    60%{transform:translateX(4px) rotate(1deg)}
    70%{transform:translateX(-2px)}
    80%{transform:translateX(2px)}
  }

  .box.shake-1 { animation: shake-light 0.4s ease; }
  .box.shake-2 { animation: shake-medium 0.5s ease; }
  .box.shake-3 { animation: shake-medium 0.55s ease; }
  .box.shake-4 { animation: shake-heavy 0.7s ease; }
  .box.shake-final { animation: shake-heavy 0.8s ease; }

  /* Glow intensities */
  .box.glow-1 { box-shadow: 0 0 50px rgba(201,168,76,0.2), inset 0 0 30px rgba(201,168,76,0.05); }
  .box.glow-2 { box-shadow: 0 0 60px rgba(201,168,76,0.3), inset 0 0 40px rgba(201,168,76,0.08); }
  .box.glow-3 { box-shadow: 0 0 70px rgba(201,168,76,0.4), inset 0 0 50px rgba(201,168,76,0.12); }
  .box.glow-4 { box-shadow: 0 0 85px rgba(201,168,76,0.55), inset 0 0 60px rgba(201,168,76,0.18); }

  /* Box open animation */
  @keyframes box-burst {
    0% { opacity: 1; transform: scale(1) rotate(0); }
    50% { opacity: 0.3; transform: scale(1.1) rotate(5deg); }
    100% { opacity: 0; transform: scale(1.3) rotate(10deg); }
  }
  .box.burst { animation: box-burst 0.6s cubic-bezier(0.36,0,0.66,1) forwards; }

  /* Golden particles */
  @keyframes particle-up {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0); }
  }
  .particle {
    position: absolute; width: 4px; height: 4px;
    background: var(--gold); border-radius: 50%;
    animation: particle-up 0.8s ease-out forwards;
  }

  /* ── Reveal animation ── */
  @keyframes reveal-card {
    0% { opacity: 0; transform: scale(0.85) translateY(30px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }

  /* ── Result card ── */
  #screen-result { gap: 1.5rem; }

  .result-card {
    width: 100%; background: var(--paper);
    border-radius: 16px; overflow: hidden; color: var(--ink);
    animation: reveal-card 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }

  .card-header {
    padding: 1.8rem 1.8rem 1.2rem;
    background: var(--ink); position: relative;
  }
  .card-category {
    font-size: 0.65rem; letter-spacing: 0.3em;
    color: var(--gold); margin-bottom: 0.6rem; text-transform: uppercase;
  }
  .card-personality-label {
    font-size: 0.7rem; letter-spacing: 0.2em;
    color: var(--gold-light); margin-bottom: 0.4rem;
    font-style: italic; opacity: 0.8;
  }

  .card-trait {
    font-family: "Noto Serif SC", serif;
    font-size: 0.85rem; line-height: 1.7;
    color: var(--vermillion);
    padding: 0.8rem 1rem; margin-bottom: 0.8rem;
    background: rgba(192,57,43,0.06);
    border-left: 2px solid var(--vermillion);
    border-radius: 0 8px 8px 0; letter-spacing: 0.03em;
  }
  .card-name-zh {
    font-family: "Noto Serif SC", serif;
    font-size: 2.2rem; font-weight: 900; color: white; line-height: 1.1;
  }
  .card-name-sub {
    font-size: 0.9rem; color: var(--ash); margin-top: 0.3rem; letter-spacing: 0.1em;
  }
  .card-emotion-tag {
    position: absolute; top: 1.8rem; right: 1.8rem;
    background: rgba(201,168,76,0.15);
    border: 1px solid rgba(201,168,76,0.4);
    border-radius: 20px; padding: 0.3rem 0.8rem;
    font-size: 0.72rem; color: var(--gold-light); letter-spacing: 0.1em;
  }

  /* Card visual - premium illustrated area */
  .card-visual {
    height: 220px; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .card-visual svg { width: 100%; height: 100%; }
  /* Real photo card visuals */
  .card-img-wrap {
    width: 100%; height: 100%; position: relative; overflow: hidden;
  }
  .card-img {
    width: 100%; height: 100%; object-fit: cover;
    filter: brightness(0.7) contrast(1.15) saturate(0.75);
    transition: filter 0.5s ease;
  }
  .card-img-gradient {
    position: absolute; inset: 0; pointer-events: none;
  }
  .card-img-fallback {
    display: flex; align-items: center; justify-content: center;
    font-size: 5rem;
  }

  .card-body { padding: 1.5rem 1.8rem; }
  .card-desc {
    font-size: 0.9rem; line-height: 1.85; color: #3a3530; margin-bottom: 1rem;
  }
  .card-dimensions {
    display: flex; gap: 0.4rem; flex-wrap: wrap; margin-bottom: 0.8rem;
  }
  .dim-chip {
    font-size: 0.65rem; padding: 0.2rem 0.6rem;
    border-radius: 12px;
    background: rgba(15,14,12,0.06);
    border: 1px solid rgba(15,14,12,0.1);
    color: #5a5550; letter-spacing: 0.05em;
    font-family: "Noto Serif SC", serif;
  }
  .card-origin {
    display: flex; gap: 1.5rem; padding-top: 1rem;
    border-top: 1px solid rgba(0,0,0,0.08); flex-wrap: wrap;
  }
  .origin-item { display: flex; flex-direction: column; gap: 0.2rem; }
  .origin-label { font-size: 0.62rem; letter-spacing: 0.2em; color: var(--ash); text-transform: uppercase; }
  .origin-value { font-family: "Noto Serif SC", serif; font-size: 0.9rem; color: var(--ink); font-weight: 700; }
  .card-color-strip { height: 4px; width: 100%; }

  .card-link {
    display: inline-block; margin-top: 0.8rem;
    font-size: 0.78rem; color: var(--vermillion);
    text-decoration: none; letter-spacing: 0.05em;
    border-bottom: 1px solid rgba(192,57,43,0.3);
    transition: all 0.2s;
    font-family: "Noto Serif SC", serif;
  }
  .card-link:hover { color: #a93226; border-color: #a93226; }

  /* ── Match reason ── */
  .match-reason {
    width: 100%; padding: 1.2rem 1.5rem;
    background: rgba(201,168,76,0.07);
    border: 1px solid rgba(201,168,76,0.2);
    border-radius: 12px; font-size: 0.85rem;
    line-height: 1.7; color: var(--gold-light);
  }
  .match-reason strong { color: var(--gold); font-weight: 400; }

  /* ── Action buttons ── */
  .action-row { display: flex; gap: 0.8rem; width: 100%; }
  .btn-secondary {
    flex: 1; background: transparent; border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px; padding: 0.8rem; font-size: 0.85rem;
    color: var(--smoke); cursor: pointer;
    letter-spacing: 0.08em; transition: all 0.2s;
  }
  .btn-secondary:hover { border-color: rgba(255,255,255,0.4); background: rgba(255,255,255,0.05); }
  .btn-primary {
    flex: 1; background: var(--vermillion); border: none; border-radius: 8px;
    padding: 0.8rem; font-size: 0.85rem;
    font-family: "Noto Serif SC", serif; color: white;
    cursor: pointer; letter-spacing: 0.1em; transition: all 0.2s;
  }
  .btn-primary:hover { background: #a93226; }

  /* ── Loading dots ── */
  @keyframes dot-bounce {
    0%,80%,100%{transform:translateY(0)}
    40%{transform:translateY(-6px)}
  }
  .loading-dots { display: flex; gap: 6px; }
  .loading-dots span {
    width: 8px; height: 8px; background: var(--gold);
    border-radius: 50%; animation: dot-bounce 1.2s infinite;
  }
  .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

  .error-msg { color: #e88; font-size: 0.82rem; text-align: center; padding: 0.8rem; }

  /* ── Responsive ── */
  @media (max-width: 480px) {
    .emotion-grid { grid-template-columns: repeat(2, 1fr); gap: 0.6rem; }
    .emotion-btn { padding: 0.9rem 0.4rem; }
    .card-name-zh { font-size: 1.6rem; }
    .card-emotion-tag { position: static; display: inline-block; margin-top: 0.6rem; }
    .card-visual { height: 170px; }
    .card-img { object-fit: cover; }
    .card-origin { gap: 0.8rem; }
    .vibe-grid { gap: 0.4rem; }
    .vibe-btn { padding: 0.45rem 0.8rem; font-size: 0.75rem; }
    .lang-grid { gap: 0.6rem; }
    .lang-btn { padding: 1.5rem 0.8rem; }
    .box-container { width: 150px; height: 150px; }
    .box-glyph { font-size: 2rem; }
  }
</style>
<style id="highlight-mengshou-style">
    .highlight-mengshou-wrap {
        background: #ff9;
        cursor: pointer;
    }
    .highlight-mengshou-wrap.active {
        background: #ffb;
    }
</style></head>
<body>

<header>
  <div class="logo" id="headerLogo">非遗盲盒</div>
  <div class="tagline" id="headerTagline">今日之物 · 因你而来</div>
</header>

<div class="lang-badge" id="langBadge">
  <button data-lang="zh" class="active">中</button>
  <button data-lang="en">EN</button>
  <button data-lang="ja">日</button>
</div>

<main>

  <!-- Screen 0: language -->
  <div class="screen active" id="screen-lang">
    <h2 class="prompt"><em data-i18n="lang_title">选择语言</em></h2>
    <div class="lang-grid">
      <button class="lang-btn" data-lang="zh"><span class="lang-flag">🏮</span><span class="lang-name">中文</span></button>
      <button class="lang-btn" data-lang="en"><span class="lang-flag">🌍</span><span class="lang-name">English</span></button>
      <button class="lang-btn" data-lang="ja"><span class="lang-flag">⛩️</span><span class="lang-name">日本語</span></button>
    </div>
  </div>

  <!-- Screen 1: emotion -->
  <div class="screen" id="screen-emotion">
    <p class="step-label" data-i18n="step1">第一步</p>
    <h2 class="prompt" data-i18n="_html emotion_prompt">此刻，你的心情<em>更像</em>哪一种？</h2>
    <div class="emotion-grid" id="emotionGrid"><button class="emotion-btn" data-emotion="平静" data-key="calm"><span class="emotion-icon">🌙</span><span class="emotion-name">平静</span><span class="emotion-sub">like still water</span></button><button class="emotion-btn" data-emotion="雀跃" data-key="joy"><span class="emotion-icon">🌸</span><span class="emotion-name">雀跃</span><span class="emotion-sub">something good happened</span></button><button class="emotion-btn" data-emotion="怀念" data-key="nostalgic"><span class="emotion-icon">🍂</span><span class="emotion-name">怀念</span><span class="emotion-sub">missing something old</span></button><button class="emotion-btn" data-emotion="疲惫" data-key="tired"><span class="emotion-icon">🌫</span><span class="emotion-name">疲惫</span><span class="emotion-sub">need to rest</span></button><button class="emotion-btn" data-emotion="好奇" data-key="curious"><span class="emotion-icon">✨</span><span class="emotion-name">好奇</span><span class="emotion-sub">want to explore</span></button><button class="emotion-btn" data-emotion="热烈" data-key="passionate"><span class="emotion-icon">🔥</span><span class="emotion-name">热烈</span><span class="emotion-sub">full of energy</span></button></div>
    <button class="cta" id="toVibeBtn" disabled="" data-i18n="continue_btn">继续 →</button>
    <button class="back-btn" onclick="goBack()" data-i18n="back_btn">← 返回</button>
  </div>

  <!-- Screen 2: vibe -->
  <div class="screen" id="screen-vibe">

// ── Personality traits for each heritage type ──
const HERITAGE_TRAITS = {
  1: { zh:"沉静如水，内心自有山河。不争不抢，却自成世界。你不喜欢喧嚣，但你的安静本身就是一种力量。和青花瓷一样，你相信时间是最好的工匠——越沉淀，越珍贵。在别人匆匆忙忙的时候，你正一笔一画地勾勒自己的宇宙。",
    en:"Calm as still water, carrying mountains within. You never clamor, yet your silence is its own force. Like blue-and-white porcelain, you trust time as the finest craftsman — the longer you settle, the more precious you become. While others rush, you paint your universe stroke by stroke.",
    ja:"静かな水面のように、内に山河を宿す。争わず、それでいて完璧な世界。青花と同じく、時間こそ最高の職人だと信じている——沈殿すればするほど、価値が増す。人々が急ぐ中、あなたは一筆一筆、自分の宇宙を描いている。" },
  2: { zh:"光影魔术师，幕后的故事讲述者。你的有趣，只有懂的人才看得见。皮影型人格的人天生是气氛制造者——你在哪里，故事就在哪里。你喜欢把真实藏在影子里，让愿意走近的人一探究竟。你的灵魂，一半在台前挥洒，一半在幕后微笑。",
    en:"A magician of light and shadow, a storyteller behind the curtain. Shadow Puppetry types are natural atmosphere-makers — wherever you are, stories unfold. You like hiding truth behind shadows, inviting only those who truly look to discover. Half your soul performs on stage; the other half smiles behind the screen.",
    ja:"光と影の魔術師、幕の後ろの語り部。影絵タイプの人は生まれつきの雰囲気メーカー——あなたがいるところに物語が生まれる。真実は影の中に隠し、本当に見ようとする人だけに発見させる。あなたの魂は、半分は舞台で輝き、半分は幕の後ろで微笑む。" },
  3: { zh:"繁复而热烈，每一面都精心编织。你的人生，经纬分明。蜀锦型人格的人从不做简单的事——你享受复杂本身。别人看到的绚烂图案，背后是你一针一线的投入。你相信精致不是天赋，是千万次重复后的本能。你活得像一匹锦缎：越细看，越惊叹。",
    en:"Intricate and passionate, every facet carefully woven. Shu Brocade types never do simple things — you savor complexity itself. What others see as dazzling patterns is your stitch-by-stitch dedication. You believe refinement isn't talent but instinct born from ten thousand repetitions. You live like a brocade: the closer one looks, the more astonishing.",
    ja:"複雑で情熱的、あらゆる面が丹念に織られている。蜀錦タイプの人は決して簡単なことをしない——複雑さそのものを味わう。人が見る華やかな模様の裏には、あなたの一針一針の投入がある。繊細さは才能ではなく、万回の反復から生まれた本能だと信じている。" },
  4: { zh:"七弦之间自有天地。少言，但每一句都有回响。古琴型人格是人群里的留白——你不会填满每一个空隙，但你的存在让整个空间有了质地。你相信声音的价值不在于多，而在于对的人能听出弦外之音。寂静是你最好的朋友，共鸣是你最深的快乐。",
    en:"Seven strings hold the universe. You speak little, but every word echoes. Guqin types are the empty spaces in a crowd — you don't fill every gap, but your presence gives the room texture. You believe sound's value isn't in quantity but in whether the right person hears between the notes. Silence is your best friend; resonance, your deepest joy.",
    ja:"七弦の間に天地がある。寡黙だが、一言一言に余韻がある。古琴タイプの人は群衆の中の余白——すべての隙間を埋めはしないが、あなたの存在が空間に質感を与える。音の価値は量ではなく、正しい人が弦の外の音を聴けることにあると信じている。静寂は最高の友、共鳴は最も深い喜び。" },
  5: { zh:"在约束中寻找自由，在规则里创造意外。你的美，拆开才知道。扎染型人格从不走直线——你偏爱那些带着不确定性的选择。你相信最好的东西都是无法复制的，就像你的人生：每一次展开，都是唯一的图案。别人追求完美，你追求独一无二。",
    en:"Finding freedom within constraints, creating surprises within rules. Tie-dye types never walk straight lines — you favor choices tinged with uncertainty. You believe the best things can never be replicated, just like your life: every unfolding reveals a one-of-a-kind pattern. Others chase perfection; you chase uniqueness.",
    ja:"制約の中で自由を見つけ、ルールの中で驚きを生む。絞り染めタイプの人は決して直線を歩まない——不確かさを帯びた選択を好む。最高のものは決して複製できないと信じている、あなたの人生のように：広げるたびに唯一無二の模様。人は完璧を追うが、あなたは唯一無二を追う。" },
  6: { zh:"于纸上镂空世界。一刀一剪，都是心想事成。剪纸型人格的人有一种孩子气的笃定——你相信只要动手，世界就会变得不一样。你的快乐很简单：一张红纸，一把剪刀，一个下午。你知道那些镂空的地方不是空洞，是留给光进来的。",
    en:"Carving worlds from paper. Every cut is a wish come true. Paper Cutting types have a childlike certainty — you believe the world changes the moment you start making. Your joy is simple: a sheet of red paper, a pair of scissors, an afternoon. You know the empty spaces aren't voids — they're openings for light.",
    ja:"紙の上に世界を切り抜く。一刃一刃が願いの実現。切り紙タイプの人は子どもっぽい確信を持っている——手を動かせば、世界は変わると信じている。あなたの喜びはシンプル：一枚の赤い紙、一丁の鋏、一つの午後。切り抜かれた空白は空虚ではなく、光のための開口部だと知っている。" },
  7: { zh:"温润如玉，越相处越有味道。急躁的人喝不了你的茶。紫砂壶型人格是慢热的——你需要时间来暖场，但只要温度够了，你就是世界上最熨帖的陪伴。你记得每一次遇见，每一个人的温度。你的好，需要耐心才能品出来，但品出来的人，再也离不开。",
    en:"Warm as jade, deepening with every encounter. Zisha Teapot types are slow to warm — you need time, but once the temperature's right, you're the most soothing company in the world. You remember every encounter, every person's warmth. Your goodness needs patience to taste, but those who taste it can never leave.",
    ja:"玉のように温かく、付き合うほどに味わい深い。紫砂急須タイプの人はゆっくり温まる——時間が必要だが、温度が整えば、世界で最も心地よい伴侶になる。あなたはすべての出会いを、すべての人の温もりを覚えている。あなたの良さは忍耐がなければ味わえないが、味わった人はもう離れられない。" },
  8: { zh:"逆风而上，越飞越高。你需要一根线，也需要一阵风。风筝型人格是自由的——但不是无根的自由。你知道那根线不是束缚，是让你飞得更远的底气。你对世界永远保持仰望的姿态，哪怕逆风，也能把它变成上升的助力。你的乐观，是会传染的。",

// ── Screen navigation ──
// Navigation stack for back button
let screenStack = [];

function showScreen(id, trackBack = true) {
  document.querySelectorAll('.screen.active').forEach(s => {
    if (trackBack && s.id && s.id !== id) screenStack.push(s.id);
  });
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const tgt = document.getElementById(id);
  if (tgt) tgt.classList.add('active');
  if (id === 'screen-result') {
    const card = document.getElementById('resultCard');
    if (card) { card.style.animation = 'none'; card.offsetHeight; card.style.animation = 'reveal-card 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) forwards'; }
  }
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function goBack() {
  // Clear current screen's selection visually
  document.querySelectorAll('.screen.active .selected').forEach(b => b.classList.remove('selected'));
  if (screenStack.length === 0) { showScreen('screen-emotion', false); return; }
  const prev = screenStack.pop();
  showScreen(prev, false);
}

function goToVibe() { showScreen('screen-vibe'); }
function goToMaterial() { showScreen('screen-material'); }
function goToEra() { showScreen('screen-era'); }

function goToOpen() {
  tapCount = 0;
  matchedItem = null;
  resetBox();
  updateTapProgress();
  document.getElementById('hintText').classList.remove('show');
  document.getElementById('hintText').textContent = '';
  document.getElementById('boxGlyph').textContent = '物';

// ── Box & tap mechanics ──
function resetBox() {
  const box = document.getElementById('theBox');
  const dots = document.getElementById('loadingDots');
  const err = document.getElementById('errorMsg');
  box.style.opacity = '1'; box.style.transform = '';
  box.className = 'box';
  if (dots) dots.style.display = 'none';
  if (err) err.style.display = 'none';
}

function updateTapProgress() {
  const dots = document.querySelectorAll('#tapProgress .tap-dot');
  dots.forEach((d, i) => {
    d.classList.remove('filled', 'current');
    if (i < tapCount) d.classList.add('filled');
    if (i === tapCount && tapCount < 5) d.classList.add('current');
  });
}

function spawnParticles() {
  const container = document.getElementById('boxContainer');
  for (let i = 0; i < 8; i++) {
    const p = document.createElement('span');
    p.className = 'particle';
    p.style.left = (40 + Math.random() * 100) + 'px';
    p.style.top = (50 + Math.random() * 80) + 'px';
    p.style.width = (3 + Math.random() * 4) + 'px';
    p.style.height = p.style.width;
    p.style.animationDuration = (0.5 + Math.random() * 0.6) + 's';
    p.style.animationDelay = (Math.random() * 0.2) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1000);
  }
}

async function openBox() {
  if (tapCount >= 5) return;

  const box = document.getElementById('theBox');
  const hint = document.getElementById('boxHint');
  const hintText = document.getElementById('hintText');
  const dots = document.getElementById('loadingDots');

  tapCount++;

  // If this is the first tap, find the match now
  if (tapCount === 1) {
    matchedItem = findMatch();
  }

  // Update progress dots
  updateTapProgress();

  // Shake animation based on tap number
  const shakeClass = tapCount === 5 ? 'shake-final' : `shake-${Math.min(tapCount, 4)}`;
  box.classList.remove('shake-1','shake-2','shake-3','shake-4','shake-final');
  void box.offsetWidth;
  box.classList.add(shakeClass);

  // Glow effect
  box.classList.remove('glow-1','glow-2','glow-3','glow-4');
  if (tapCount >= 2) box.classList.add(`glow-${Math.min(tapCount-1, 4)}`);

  // Glyph change
  const glyphs = ['物','物','物','?','!'];
  document.getElementById('boxGlyph').textContent = glyphs[tapCount - 1];

  // Update hint
  if (tapCount === 5) {
    hint.textContent = t('opening');
    spawnParticles();
  } else {
    hint.textContent = `${tapCount}/5`;
  }

  // Show clue hint (for taps 1-4)
  if (tapCount <= 4 && matchedItem) {
    const hintsKey = `hints_${currentLang}`;
    const hints = matchedItem[hintsKey] || matchedItem.hints_zh;
    hintText.textContent = hints[tapCount - 1];
    hintText.classList.add('show');
  }

  if (tapCount < 5) return;

  // ── Final tap: burst and reveal ──
  hintText.classList.remove('show');

  // Burst animation
  setTimeout(() => {
    box.classList.add('burst');
    spawnParticles();
  }, 300);

  await new Promise(r => setTimeout(r, 800));
  dots.style.display = 'flex';

  await new Promise(r => setTimeout(r, 900));

  try {
    dots.style.display = 'none';
    renderResult(matchedItem);
    showScreen('screen-result');
  } catch (err) {
    dots.style.display = 'none';
    document.getElementById('errorMsg').style.display = 'block';
    document.getElementById('errorMsg').textContent = t('error_msg');
    resetBox();
    tapCount = 0;
    updateTapProgress();
    hint.textContent = t('click_open');
  }
}

// ── Matching ──
function findMatch() {
  // Convert display values to matching keys using index lookup
  const vibeMapZh = ["素雅","鲜艳","神秘","自然","精致","朴素"];
  const vibeIdx = I18N[currentLang].vibes.indexOf(selectedVibe);
  const vibeZh = vibeIdx >= 0 ? vibeMapZh[vibeIdx] : selectedVibe;
  const matIdx = I18N[currentLang].materials.indexOf(selectedMaterial);
  const matKey = matIdx >= 0 ? DIM_KEYS.materials[matIdx] : null;
  const eraIdx = I18N[currentLang].eras.indexOf(selectedEra);
  const eraKey = eraIdx >= 0 ? DIM_KEYS.eras[eraIdx] : null;
  const purIdx = I18N[currentLang].purposes.indexOf(selectedPurpose);
  const purKey = purIdx >= 0 ? DIM_KEYS.purposes[purIdx] : null;
  const elIdx = I18N[currentLang].elements.indexOf(selectedElement);
  const elKey = elIdx >= 0 ? DIM_KEYS.elements[elIdx] : null;
  const anIdx = I18N[currentLang].animals.indexOf(selectedAnimal);
  const anKey = anIdx >= 0 ? DIM_KEYS.animals[anIdx] : null;
  const hoIdx = I18N[currentLang].homes.indexOf(selectedHome);
  const hoKey = hoIdx >= 0 ? DIM_KEYS.homes[hoIdx] : null;
  const tiIdx = I18N[currentLang].times.indexOf(selectedTime);
  const tiKey = tiIdx >= 0 ? DIM_KEYS.times[tiIdx] : null;
  const phIdx = I18N[currentLang].philosophies.indexOf(selectedPhilosophy);
  const phKey = phIdx >= 0 ? DIM_KEYS.philosophies[phIdx] : null;

  // Score each item across 10 dimensions
  const scored = heritageDB.map(item => {
    let score = 0;
    const ext = HERITAGE_EXT[item.id] || {};
    if (item.emotions.includes(selectedEmotion.name)) score++;
    if (item.vibes.includes(vibeZh)) score++;
    if (matKey && item.materials.includes(matKey)) score++;
    if (eraKey && item.eras.includes(eraKey)) score++;
    if (purKey && item.purposes.includes(purKey)) score++;
    if (elKey && ext.elements && ext.elements.includes(elKey)) score++;
    if (anKey && ext.animals && ext.animals.includes(anKey)) score++;
    if (hoKey && ext.homes && ext.homes.includes(hoKey)) score++;
    if (tiKey && ext.times && ext.times.includes(tiKey)) score++;
    if (phKey && ext.philosophies && ext.philosophies.includes(phKey)) score++;
    return { item, score };
    return { item, score };
  });

  // Sort by score descending, pick from top scorers
  scored.sort((a, b) => b.score - a.score);
  const maxScore = scored[0].score;
  const topCandidates = scored.filter(s => s.score === maxScore);
  const pick = topCandidates[Math.floor(Math.random() * topCandidates.length)].item;

  const ek = selectedEmotion.key;
  const suff = currentLang === 'en' ? '_en' : currentLang === 'ja' ? '_ja' : '';
  const reason = pick.match_reason[ek + suff] || pick.match_reason['default' + suff] || pick.match_reason.default;

  return { ...pick, match_reason: reason };
}

  const desc = lang === 'en' ? item.desc_en : lang === 'ja' ? item.desc_ja : item.desc_zh;
  const origin = lang === 'en' ? (item.origin_en||item.origin) : lang === 'ja' ? (item.origin_ja||item.origin) : item.origin;
  const svgArt = buildCardVisual(item);

  // Calculate match score for display
  const vibeMapZh2 = ["素雅","鲜艳","神秘","自然","精致","朴素"];
  const vIdx = I18N[currentLang].vibes.indexOf(selectedVibe);
  const vZh = vIdx >= 0 ? vibeMapZh2[vIdx] : selectedVibe;
  const mIdx = I18N[currentLang].materials.indexOf(selectedMaterial);

// ── Save as image (html2canvas) ──
function shareCard() {
  const card = document.getElementById('resultCard');
  if (!card) return;

  showToast('正在生成图片...');

  // Load html2canvas dynamically if not loaded
  if (typeof html2canvas === 'undefined') {
    const script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = () => captureCard(card);
    script.onerror = () => fallbackShare();
    document.head.appendChild(script);
  } else {
    captureCard(card);
  }
}

function captureCard(card) {
  html2canvas(card, {
    backgroundColor: '#faf6f0',
    scale: 2,
    useCORS: true,
    allowTaint: true,
    logging: false
  }).then(canvas => {
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      const name = document.querySelector('.card-name-zh')?.textContent || '非遗盲盒';
      a.href = url;
      a.download = `非遗盲盒_${name}_${Date.now()}.png`;
      a.click();
      URL.revokeObjectURL(url);
      showToast('✅ 图片已保存！');
    }, 'image/png');
  }).catch(() => {
    fallbackShare();
  });
}

function fallbackShare() {
  const name = document.querySelector('.card-name-zh')?.textContent || '???';
  const text = t('share_text').replace('{name}', name);
  if (navigator.clipboard?.writeText) {
    navigator.clipboard.writeText(text).then(()=>showToast(t('toast_copied'))).catch(()=>showToast(text));
  } else {
    const ta = document.createElement('textarea'); ta.value = text;
    ta.style.cssText = 'position:fixed;opacity:0'; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast(t('toast_copied'));
  }
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div'); toast.id = 'toast';
    toast.style.cssText = 'position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:rgba(201,168,76,0.95);color:#0f0e0c;padding:0.7rem 1.5rem;border-radius:30px;font-size:0.85rem;z-index:9999;pointer-events:none;opacity:0;transition:opacity 0.3s;letter-spacing:0.05em;';
    document.body.appendChild(toast);
  }
  toast.textContent = msg; toast.style.opacity = '1';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => { toast.style.opacity = '0'; }, 2500);
}

function selectLang(lang) {
  applyI18n(lang);
  selectedEmotion = null; selectedVibe = null;
  selectedMaterial = null; selectedEra = null; selectedPurpose = null;
  selectedElement = null; selectedAnimal = null; selectedHome = null;

  document.getElementById('toElementBtn').disabled = true;
  document.getElementById('toAnimalBtn').disabled = true;
  document.getElementById('toHomeBtn').disabled = true;
  document.getElementById('toTimeBtn').disabled = true;
  document.getElementById('toPhilosophyBtn').disabled = true;
  document.getElementById('toOpenBtn').disabled = true;
  showScreen('screen-emotion');
}

// ── Init ──
function init() {
  applyI18n('zh');
  document.querySelectorAll('#screen-lang .lang-btn').forEach(b => b.addEventListener('click', ()=>selectLang(b.dataset.lang)));

  document.getElementById('toElementBtn').addEventListener('click', goToElement);
  document.getElementById('toAnimalBtn').addEventListener('click', goToAnimal);
  document.getElementById('toHomeBtn').addEventListener('click', goToHome);
  document.getElementById('toTimeBtn').addEventListener('click', goToTime);
  document.getElementById('toPhilosophyBtn').addEventListener('click', goToPhilosophy);
  document.getElementById('toOpenBtn').addEventListener('click', goToOpen);
  document.getElementById('boxContainer').addEventListener('click', openBox);
  document.getElementById('restartBtn').addEventListener('click', restart);
  document.getElementById('shareBtn').addEventListener('click', shareCard);
}

document.addEventListener('DOMContentLoaded', init);
